<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | DriveEasy</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-car-side"></i> Drive<span>Easy</span>
      </a>
      
      <button class="mobile-toggle" id="mobile-toggle">
        <i class="fa-solid fa-bars"></i>
      </button>

      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="cars.html" data-i18n="nav.cars">Cars</a></li>
        <li><a href="about.html" data-i18n="nav.about">About Us</a></li>
        <li id="nav-login"><a href="login.html" class="btn btn-outline" data-i18n="nav.login">Log in</a></li>
        <li id="nav-register"><a href="register.html" class="btn btn-primary active" data-i18n="nav.signup">Sign up</a></li>
        <li id="nav-profile" style="display: none;"><a href="profile.html" data-i18n="nav.profile">My Bookings</a></li>
        <li id="nav-admin" style="display: none;"><a href="admin.html" data-i18n="nav.admin">Admin</a></li>
        <li id="nav-logout" style="display: none;"><a href="#" class="btn btn-outline" onclick="logout()" data-i18n="nav.logout">Log out</a></li>
        <li style="display:flex; align-items:center; gap:10px;">
          <div id="nav-lang" class="nav-dropdown-container">
            <button id="lang-btn" class="nav-btn" style="padding:0; font-size:1.2rem; background:none; border:none; outline:none; cursor:pointer;">
              <span id="current-lang-flag">🇬🇧</span>
            </button>
            <div id="lang-dropdown-menu" class="dropdown-menu" style="min-width: 150px; right: 0;">
              <div class="dropdown-item" onclick="setLang('en')" style="cursor:pointer; display:flex; gap:10px; padding: 10px; align-items: center;">
                <img src="https://flagcdn.com/w40/gb.png" width="20" height="14" style="border-radius:2px;"> English
              </div>
              <div class="dropdown-item" onclick="setLang('mk')" style="cursor:pointer; display:flex; gap:10px; padding: 10px; align-items: center;">
                <img src="https://flagcdn.com/w40/mk.png" width="20" height="14" style="border-radius:2px;"> Македонски
              </div>
              <div class="dropdown-item" onclick="setLang('sq')" style="cursor:pointer; display:flex; gap:10px; padding: 10px; align-items: center;">
                <img src="https://flagcdn.com/w40/al.png" width="20" height="14" style="border-radius:2px;"> Shqip
              </div>
            </div>
          </div>
          <button class="theme-toggle nav-btn"><i class="fa-solid fa-circle-half-stroke"></i></button>
          <div id="nav-notif" class="nav-dropdown-container" style="display:none;">
            <button id="notif-btn" class="nav-btn">
              <i class="fa-solid fa-bell"></i>
              <span id="notif-badge" class="notif-badge" style="display:none;">0</span>
            </button>
            <div id="notif-dropdown" class="dropdown-menu">
              <div class="dropdown-header" data-i18n="nav.notif">Notifications</div>
              <div id="notif-list"></div>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h2 data-i18n="auth.register_title">Create an Account</h2>
      <p class="mb-4" style="color: var(--clr-text-muted);" data-i18n="auth.register_subtitle">Join DriveEasy and start your journey.</p>
      
      <form id="register-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="reg-firstname" data-i18n="auth.firstname">First Name</label>
            <input type="text" id="reg-firstname" class="form-control" required minlength="2">
          </div>
          <div class="form-group">
            <label for="reg-lastname" data-i18n="auth.lastname">Last Name</label>
            <input type="text" id="reg-lastname" class="form-control" required minlength="2">
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email" data-i18n="auth.email">Email</label>
          <input type="email" id="reg-email" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="reg-phone" data-i18n="auth.phone">Phone Number</label>
          <input type="tel" id="reg-phone" class="form-control" required placeholder="+1 (555) 000-0000">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="reg-dob" data-i18n="auth.dob">Date of Birth</label>
            <input type="date" id="reg-dob" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="reg-license" data-i18n="auth.license">Driver's License</label>
            <input type="text" id="reg-license" class="form-control" required placeholder="DL Number">
          </div>
        </div>
        
        <div class="form-group">
          <label for="reg-password" data-i18n="auth.password">Password</label>
          <input type="password" id="reg-password" class="form-control" required minlength="6">
        </div>
        
        <div id="reg-error-message" class="error-msg"></div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" data-i18n="auth.signup_btn">Sign Up</button>
      </form>
      
      <p style="margin-top: 1.5rem; color: var(--clr-text-muted);">
        <span data-i18n="auth.have_account">Already have an account?</span> <a href="login.html" style="color: var(--clr-primary); font-weight: 600;" data-i18n="nav.login">Log in</a>
      </p>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
